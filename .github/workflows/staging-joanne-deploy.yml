name: Staging Joanne Deploy
on:
  push:
    branches: 
      - develop
  
jobs:
  build-and-deploy: 
    runs-on: ubuntu-latest

    env:
      MAIL_USERNAME: ${{ secrets.R_MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.R_MAIL_PASSWORD }}

      SERVER_PORT: ${{ secrets.R_SERVER_PORT }}

      TOKEN_SECRET: ${{ secrets.R_TOKEN_SECRET }}
      TOKEN_ACCESS_EXP: ${{ secrets.R_TOKEN_ACCESS_EXP }}
      TOKEN_REFRESH_EXP: ${{ secrets.R_TOKEN_REFRESH_EXP }}

      S3_BUCKET: ${{ secrets.R_S3_BUCKET }}
      S3_REGION: ${{ secrets.R_S3_REGION }}
      S3_ACCESS_KEY: ${{ secrets.R_S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.R_S3_SECRET_KEY }}

      OPEN_API_KEY: ${{ secrets.R_OPEN_API_KEY }}

      DB_CLASS_NAME: ${{ secrets.R_DB_CLASS_NAME }}
      DB_URL: ${{ secrets.R_DB_URL }}
      DB_USERNAME: ${{ secrets.R_DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.R_DB_PASSWORD }}

      REDIS_HOST: ${{ secrets.R_REDIS_HOST }}
      REDIS_PORT: ${{ secrets.R_REDIS_PORT }}

      DISCORD_WEBHOOK_URL: ${{ secrets.J_DISCORD_WEBHOOK_URL }}
    
      EB_APPLICATION_NAME: ${{ secrets.J_EB_APPLICATION_NAME }}
      EB_ENVIRONMENT_NAME: ${{ secrets.J_EB_ENVIRONMENT_NAME }}

      KAKAO_CLIENT_ID: ${{ secrets.R_KAKAO_CLIENT_ID }}
      KAKAO_CLIENT_SECRET: ${{ secrets.R_KAKAO_CLIENT_SECRET }}
      KAKAO_REDIRECT_URI: ${{ secrets.J_KAKAO_REDIRECT_URI }}

      GOOGLE_CLIENT_ID: ${{ secrets.J_GOOGLE_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Create temporary application.yml
        run: |
          cat <<EOT > src/main/resources/application.yml
          spring:
            profiles:
              active: prod
            mvc:
              async:
                request-timeout: -1
            mail:
              host: smtp.gmail.com
              port: 587
              username: ${MAIL_USERNAME}
              password: ${MAIL_PASSWORD}
              properties:
                mail:
                  smtp:
                    auth: true
                    starttls:
                      enable: true
                      required: true
                    connectiontimeout: 5000
                    timeout: 5000
                    writetimeout: 5000
              auth-code-expiration-millis: 1800000

          server:
            port: ${SERVER_PORT}

          token:
            secret: ${TOKEN_SECRET}
            access_expiration_time: ${TOKEN_ACCESS_EXP}
            refresh_expiration_time: ${TOKEN_REFRESH_EXP}

          cloud:
            aws:
              s3:
                bucket: ${S3_BUCKET}
              stack.auto: false
              region.static: ${S3_REGION}
              credentials:
                accessKey: ${S3_ACCESS_KEY}
                secretKey: ${S3_SECRET_KEY}

          openai:
            api-key: ${OPEN_API_KEY}

          sse:
            heartbeat:
              period-ms: 15000
              idle-ms: 20000
          
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
          
          google:
            client-id: ${GOOGLE_CLIENT_ID}
          ---
          spring:
            config:
              activate:
                on-profile: prod

            jpa:
              hibernate:
                ddl-auto: none
              show-sql: true
              properties:
                hibernate:
                  format_sql: true
              open-in-view: false

            datasource:
              driver-class-name: ${DB_CLASS_NAME}
              url: ${DB_URL}
              username: ${DB_USERNAME}
              password: ${DB_PASSWORD}
          
              hikari:
                maximum-pool-size: 10
                minimum-idle: 2
                idle-timeout: 600000
                max-lifetime: 1800000
                connection-timeout: 5000
                leak-detection-threshold: 20000

            data:
              redis:
                host: ${REDIS_HOST}
                port: ${REDIS_PORT}
                duration: 600

          discord:
            webhook-url: ${DISCORD_WEBHOOK_URL}
          EOT

      - name: Build Jar (bootJar only)
        run: |
          chmod +x ./gradlew
          # ./gradlew clean build -x test
          ./gradlew clean bootJar --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.J_AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.J_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.J_AWS_REGION }}

      - name: Package bundle for EB
        run: |
          # JAR_PATH=$(ls -t build/libs/*.jar | head -n 1)
          JAR_PATH="build/libs/application.jar"

          # 검증: BOOT-INF, Main-Class/Start-Class 반드시 존재
          jar tf "$JAR_PATH" | grep -q '^BOOT-INF/' || { echo "ERROR: Not a Spring Boot fat jar"; exit 1; }
          unzip -p "$JAR_PATH" META-INF/MANIFEST.MF | egrep -q 'Main-Class|Start-Class' || { echo "ERROR: Missing Main/Start-Class"; exit 1; }

          cp "$JAR_PATH" application.jar

          BUNDLE="eb-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}.zip"
          zip -r "$BUNDLE" application.jar Procfile .platform 2>/dev/null || zip -r "$BUNDLE" application.jar
          
          echo "BUNDLE=$BUNDLE" >> $GITHUB_ENV

      - name: Upload bundle to EB S3 bucket
        run: |
          S3_BUCKET="elasticbeanstalk-ap-northeast-2-230541231307"
          aws s3 cp "$BUNDLE"  "s3://${S3_BUCKET}/$BUNDLE"
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV

      - name: Create EB application version
        run: |
          VER="run-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APPLICATION_NAME" \
            --version-label "$VER" \
            --source-bundle S3Bucket="$S3_BUCKET",S3Key="$BUNDLE"
          echo "VER=$VER" >> $GITHUB_ENV

      - name: Update EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "$EB_ENVIRONMENT_NAME" \
            --version-label "$VER"


    

    
  
