name: Staging Roy Docker Deploy

on:
  push:
    branches:
      - develop

env:
  DOCKER_USERNAME: ${{ secrets.R_DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.R_DOCKER_PASSWORD }}
  IMAGE_NAME: ${{ secrets.R_DOCKER_IMAGENAME }}

  MAIL_USERNAME: ${{ secrets.R_MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.R_MAIL_PASSWORD }}
  SERVER_PORT: ${{ secrets.R_SERVER_PORT }}
  TOKEN_SECRET: ${{ secrets.R_TOKEN_SECRET }}
  TOKEN_ACCESS_EXP: ${{ secrets.R_TOKEN_ACCESS_EXP }}
  TOKEN_REFRESH_EXP: ${{ secrets.R_TOKEN_REFRESH_EXP }}
  S3_BUCKET: ${{ secrets.R_S3_BUCKET }}
  S3_REGION: ${{ secrets.R_S3_REGION }}
  S3_ACCESS_KEY: ${{ secrets.R_S3_ACCESS_KEY }}
  S3_SECRET_KEY: ${{ secrets.R_S3_SECRET_KEY }}
  OPEN_API_KEY: ${{ secrets.R_OPEN_API_KEY }}
  DB_CLASS_NAME: ${{ secrets.R_DB_CLASS_NAME }}
  DB_URL: ${{ secrets.R_DB_URL }}
  DB_USERNAME: ${{ secrets.R_DB_USERNAME }}
  DB_PASSWORD: ${{ secrets.R_DB_PASSWORD }}
  REDIS_HOST: ${{ secrets.R_REDIS_HOST }}
  REDIS_PORT: ${{ secrets.R_REDIS_PORT }}
  DISCORD_WEBHOOK_URL: ${{ secrets.R_DISCORD_WEBHOOK_URL }}
  KAKAO_CLIENT_ID: ${{ secrets.R_KAKAO_CLIENT_ID }}
  KAKAO_CLIENT_SECRET: ${{ secrets.R_KAKAO_CLIENT_SECRET }}
  KAKAO_REDIRECT_URI: ${{ secrets.R_KAKAO_REDIRECT_URI }}
  GOOGLE_CLIENT_ID: ${{ secrets.J_GOOGLE_CLIENT_ID }}

  EC2_REGION: ${{ secrets.R_EC2_REGION }}
  EC2_ACCESS_KEY: ${{ secrets.R_EC2_ACCESS_KEY }}
  EC2_SECRET_ACCESS_KEY: ${{ secrets.R_EC2_SECRET_ACCESS_KEY }}
  EC2_INSTANCE_ID: ${{ secrets.R_EC2_INSTANCE_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Build JAR
        run: ./gradlew clean build -x test

      - name: Find and Rename JAR
        id: jar_finder
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" -type f ! -name "*-plain.jar" | head -n 1)
          FIXED_JAR_NAME="app.jar"

          if [ -z "$JAR_PATH" ]; then
            echo "::error::JAR file not found in build/libs"
            exit 1
          fi

          cp "$JAR_PATH" "$FIXED_JAR_NAME"
          echo "RENAMED_JAR_PATH=$FIXED_JAR_NAME" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ env.EC2_ACCESS_KEY }}
          aws-secret-access-key: ${{ env.EC2_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.EC2_REGION }}

      - name: Deploy via SSM (Pull and Run Docker Container with Env Vars)
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:latest"
          CONTAINER_NAME="roy-app-staging"
          HOST_PORT="${{ env.SERVER_PORT }}"
          
          ENV_VARS="-e MAIL_USERNAME='${{ env.MAIL_USERNAME }}' -e MAIL_PASSWORD='${{ env.MAIL_PASSWORD }}' -e SERVER_PORT='${{ env.SERVER_PORT }}' -e TOKEN_SECRET='${{ env.TOKEN_SECRET }}' -e TOKEN_ACCESS_EXP='${{ env.TOKEN_ACCESS_EXP }}' -e TOKEN_REFRESH_EXP='${{ env.TOKEN_REFRESH_EXP }}' -e S3_BUCKET='${{ env.S3_BUCKET }}' -e S3_REGION='${{ env.S3_REGION }}' -e S3_ACCESS_KEY='${{ env.S3_ACCESS_KEY }}' -e S3_SECRET_KEY='${{ env.S3_SECRET_KEY }}' -e OPEN_API_KEY='${{ env.OPEN_API_KEY }}' -e DB_CLASS_NAME='${{ env.DB_CLASS_NAME }}' -e DB_URL='${{ env.DB_URL }}' -e DB_USERNAME='${{ env.DB_USERNAME }}' -e DB_PASSWORD='${{ env.DB_PASSWORD }}' -e REDIS_HOST='${{ env.REDIS_HOST }}' -e REDIS_PORT='${{ env.REDIS_PORT }}' -e DISCORD_WEBHOOK_URL='${{ env.DISCORD_WEBHOOK_URL }}' -e KAKAO_CLIENT_ID='${{ env.KAKAO_CLIENT_ID }}' -e KAKAO_CLIENT_SECRET='${{ env.KAKAO_CLIENT_SECRET }}' -e KAKAO_REDIRECT_URI='${{ env.KAKAO_REDIRECT_URI }}' -e GOOGLE_CLIENT_ID='${{ env.GOOGLE_CLIENT_ID }}' -e SPRING_PROFILES_ACTIVE=docker"
          
          COMMAND_TO_RUN="docker pull ${IMAGE_TAG} && \
            (docker stop ${CONTAINER_NAME} || true) && \
            (docker rm ${CONTAINER_NAME} || true) && \
            docker run -d --restart always --name ${CONTAINER_NAME} -p ${HOST_PORT}:${HOST_PORT} ${ENV_VARS} ${IMAGE_TAG} && \
            docker rmi \$(docker images -f 'dangling=true' -q)"
          
          ESCAPED_COMMAND=$(echo "${COMMAND_TO_RUN}" | sed 's/"/\\"/g' | tr -d '\n')
          
          cat > ssm_command.json <<- EOL
          {
            "InstanceIds": ["${{ env.EC2_INSTANCE_ID }}"],
            "DocumentName": "AWS-RunShellScript",
            "Comment": "Pull and deploy Docker image",
            "Parameters": {
              "commands": ["${ESCAPED_COMMAND}"]
            }
          }
          EOL
          
          echo "Executing command via ssm_command.json..."
          aws ssm send-command --cli-input-json file://ssm_command.json